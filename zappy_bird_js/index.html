<!DOCTYPE HTML>
<html lang="en">

<head>
    <meta charset="UTF-8">
	<meta content="Flappy Bird,game,Crappy Bird,clone,javascript,html5 game,mobile,canvas,flappy bird source" name="keywords"/>
	<meta name="description" content="Clone of Flappy bird game in javascript using canvas 2d">
    <meta name="viewport" content="width=device-width, 
    user-scalable=no, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <style type="text/css">
        body {
            margin: 0;
            padding: 0;
            background: #000;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #fff;
        }
        audio {
            display: none;
        }
        #intro-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #000;
            z-index: 1000;
        }
        #intro-video.hidden {
            display: none;
        }
        #click-to-begin {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            cursor: pointer;
        }
        #click-to-begin.hidden {
            display: none;
        }
        #click-to-begin-text {
            color: #fff;
            font-family: Monospace;
            font-size: 20px;
            text-align: center;
        }
    </style>

</head>

<body>

    <video id="intro-video" autoplay muted playsinline>
        <source src="assets/voltage_intro.mov" type="video/quicktime">
        <source src="assets/voltage_intro.mov" type="video/mp4">
    </video>
    <div id="click-to-begin" class="hidden">
        <div id="click-to-begin-text">Click to Begin</div>
    </div>
    <canvas></canvas>
    <script src="js/main.js"></script>

</body>

</html>
